name: Backend CI/CD to GCE

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-cicd.yml"
  workflow_dispatch:

concurrency:
  group: backend-prod-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      IMAGE_TAG: f1bot-backend:${{ github.sha }}
      GCP_INSTANCE: shalin-e2-gcp
      REMOTE_USER: shalinshah
      CLOUDSDK_CORE_DISABLE_PROMPTS: "1"
      REMOTE_STAGING_DIR: /tmp/f1bot-cicd-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_ZONE: ${{ secrets.GCP_ZONE }}
          BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}
        run: |
          [[ -n "${GCP_SA_KEY:-}" ]] || { echo "Missing GCP_SA_KEY secret"; exit 1; }
          [[ -n "${GCP_PROJECT_ID:-}" ]] || { echo "Missing GCP_PROJECT_ID secret"; exit 1; }
          [[ -n "${GCP_ZONE:-}" ]] || { echo "Missing GCP_ZONE secret"; exit 1; }
          [[ -n "${BACKEND_ENV_FILE:-}" ]] || { echo "Missing BACKEND_ENV_FILE secret"; exit 1; }

      - name: Build backend image
        run: docker build -t "${IMAGE_TAG}" backend

      - name: Export backend image archive
        run: docker save "${IMAGE_TAG}" | gzip > f1bot-backend-image.tar.gz

      - name: Create runtime env file from secret
        shell: bash
        env:
          BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}
        run: |
          printf '%s\n' "$BACKEND_ENV_FILE" > f1bot-backend.env

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Prepare remote staging directory
        run: |
          gcloud compute ssh "${REMOTE_USER}@${GCP_INSTANCE}" \
            --quiet \
            --zone "${{ secrets.GCP_ZONE }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --command "mkdir -p '${REMOTE_STAGING_DIR}'"

      - name: Copy deployment bundle to VM
        run: |
          gcloud compute scp \
            --quiet \
            --zone "${{ secrets.GCP_ZONE }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            f1bot-backend-image.tar.gz \
            backend/docker-compose.prod.yml \
            backend/deploy/deploy_remote.sh \
            f1bot-backend.env \
            "${REMOTE_USER}@${GCP_INSTANCE}:${REMOTE_STAGING_DIR}/"

      - name: Deploy to VM using Docker Compose
        run: |
          gcloud compute ssh "${REMOTE_USER}@${GCP_INSTANCE}" \
            --quiet \
            --zone "${{ secrets.GCP_ZONE }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --command "chmod +x '${REMOTE_STAGING_DIR}/deploy_remote.sh' && TMP_IMAGE='${REMOTE_STAGING_DIR}/f1bot-backend-image.tar.gz' TMP_COMPOSE='${REMOTE_STAGING_DIR}/docker-compose.prod.yml' TMP_ENV='${REMOTE_STAGING_DIR}/f1bot-backend.env' '${REMOTE_STAGING_DIR}/deploy_remote.sh' '${IMAGE_TAG}' && rm -rf '${REMOTE_STAGING_DIR}'"
